<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国历史时间轴</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --parchment: #f5f0e8;
    --parchment-dark: #e8e0d0;
    --ink: #2c2416;
    --ink-light: #5c5240;
    --accent: #8b4513;
    --accent-gold: #c4a35a;
    --timeline-line: #3c3428;
    --card-bg: rgba(255, 252, 245, 0.92);
    --card-border: rgba(139, 69, 19, 0.25);
    --card-shadow: 0 2px 16px rgba(44, 36, 22, 0.08);
    --card-hover-shadow: 0 6px 28px rgba(44, 36, 22, 0.16);
    --dot-size: 10px;
    --dot-hover-size: 16px;
    --connector-width: 36px;
    --connector-width-far: 68px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
    background-color: var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(196, 163, 90, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(139, 69, 19, 0.04) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ── 标题 ── */
  .title-area {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 28px 0 0;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  body.micro-active .title-area {
    opacity: 0;
  }

  .main-title {
    display: inline-block;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink);
    position: relative;
  }

  .main-title::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  }

  .subtitle {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--ink-light);
    letter-spacing: 0.2em;
    font-weight: 300;
  }

  /* ── 时间轴容器 ── */
  .timeline-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    overflow-x: auto;
    cursor: grab;
    user-select: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .timeline-stage::-webkit-scrollbar { display: none; }
  .timeline-stage { -ms-overflow-style: none; scrollbar-width: none; }
  .timeline-stage.grabbing { cursor: grabbing; }

  .timeline-stage.macro-hidden {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  /* ── 主轴 ── */
  .macro-timeline {
    position: relative;
    width: 2000px;
    margin: 0 100px;
    flex-shrink: 0;
    height: 2px;
    background: var(--timeline-line);
    border-radius: 1px;
  }

  /* 主轴起点 / 终点装饰 */
  .macro-timeline::before,
  .macro-timeline::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--accent-gold);
    border-radius: 50%;
  }
  .macro-timeline::before { left: -4px; }
  .macro-timeline::after  { right: -4px; }

  /* ── 节点 ── */
  .timeline-node {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 2;
    --card-offset: var(--connector-width);
  }
  .timeline-node.offset-far {
    --card-offset: var(--connector-width-far);
  }

  /* 圆点 */
  .node-dot {
    width: var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--parchment);
    box-shadow: 0 0 0 2px var(--accent-gold);
    transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    position: relative;
  }

  .timeline-node:hover .node-dot {
    width: var(--dot-hover-size);
    height: var(--dot-hover-size);
    background: var(--accent-gold);
    box-shadow: 0 0 0 4px var(--accent-gold), 0 0 18px rgba(196, 163, 90, 0.5);
  }

  /* ── 神话节点：玉石青铜绿 · 文明微光 ── */
  .timeline-node.node-myth .node-dot {
    background: #4a5d4e;
    border-color: rgba(245, 240, 232, 0.7);
    box-shadow: 0 0 0 2px rgba(74, 93, 78, 0.5), 0 0 12px rgba(74, 93, 78, 0.25);
    animation: mythPulse 3s ease-in-out infinite;
  }

  .timeline-node.node-myth:hover .node-dot {
    width: var(--dot-hover-size);
    height: var(--dot-hover-size);
    background: #6b8a70;
    box-shadow: 0 0 0 4px rgba(74, 93, 78, 0.6), 0 0 24px rgba(74, 93, 78, 0.45);
    animation: none;
  }

  .timeline-node.node-myth:hover .node-card {
    border-color: rgba(74, 93, 78, 0.55);
    box-shadow: 0 6px 28px rgba(44, 36, 22, 0.14), 0 0 20px rgba(74, 93, 78, 0.12);
  }

  /* 连接线 */
  .node-connector {
    position: absolute;
    top: 50%;
    width: var(--connector-width);
    height: 1.5px;
    background: var(--ink-light);
    opacity: 0.5;
    transition: opacity 0.35s ease;
  }
  .timeline-node:hover .node-connector { opacity: 0.8; }

  .connector-up   { right: calc(100% + 2px); }
  .connector-down { left:   calc(100% + 2px); }

  /* ── 卡片 ── */
  .node-card {
    position: absolute;
    width: max-content;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    padding: 6px 12px;
    box-shadow: var(--card-shadow);
    transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    backdrop-filter: blur(4px);
  }

  /* 上方节点：卡片在轴上方，连接线向上 */
  .timeline-node.card-up .node-card {
    bottom: calc(var(--dot-hover-size) + 8px + var(--card-offset));
    left: 50%;
    transform: translateX(-50%);
  }
  .timeline-node.card-up .node-connector {
    right: 50%;
    top: auto;
    bottom: calc(var(--dot-size) / 2 + 4px);
    height: var(--card-offset);
    width: 1.5px;
    transform: translateX(50%);
  }

  /* 下方节点：卡片在轴下方，连接线向下 */
  .timeline-node.card-down .node-card {
    top: calc(var(--dot-hover-size) + 8px + var(--card-offset));
    left: 50%;
    transform: translateX(-50%);
  }
  .timeline-node.card-down .node-connector {
    left: 50%;
    top: calc(var(--dot-size) / 2 + 4px);
    height: var(--card-offset);
    width: 1.5px;
    transform: translateX(-50%);
  }

  .timeline-node:hover .node-card {
    box-shadow: var(--card-hover-shadow);
    border-color: var(--accent-gold);
    transform: translateX(-50%) scale(1.06);
    background: rgba(255, 252, 245, 0.98);
  }

  .card-dynasty {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .card-era {
    font-size: 0.6rem;
    color: var(--ink-light);
    margin-top: 2px;
    font-weight: 400;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* ── 次级时间轴专属 ── */
  .micro-stage-inner {
    position: relative;
    min-width: 100vw;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .micro-header {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
  }

  .micro-header .dynasty-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .micro-header .dynasty-era {
    font-size: 0.8rem;
    color: var(--ink-light);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  .back-btn {
    position: fixed;
    top: 24px;
    left: 32px;
    z-index: 10;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    padding: 8px 18px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }

  .back-btn:hover {
    border-color: var(--accent-gold);
    color: var(--accent);
    box-shadow: var(--card-hover-shadow);
  }

  .micro-timeline {
    position: relative;
    width: 1400px;
    margin: 0 100px;
    flex-shrink: 0;
    height: 2px;
    background: var(--timeline-line);
    border-radius: 1px;
    opacity: 0.7;
  }

  .micro-timeline::before,
  .micro-timeline::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    background: var(--accent-gold);
    border-radius: 50%;
  }
  .micro-timeline::before { left: -3px; }
  .micro-timeline::after  { right: -3px; }

  /* ── 响应式：移动端纵向轴 ── */
  @media (max-width: 768px) {
    /* 容器切为纵向滚动 */
    .timeline-stage {
      overflow-y: auto;
      overflow-x: hidden;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      cursor: default;
    }
    .timeline-stage.grabbing { cursor: default; }

    /* 主轴 → 纵线 */
    .macro-timeline {
      width: 2px;
      height: 3200px;
      margin: 140px 0;
      flex-shrink: 0;
    }
    .macro-timeline::before,
    .macro-timeline::after {
      top: auto;
      bottom: auto;
      left: 50%;
      transform: translateX(-50%);
    }
    .macro-timeline::before { top: -3px; }
    .macro-timeline::after  { bottom: -3px; }

    /* 次级轴 → 纵线 */
    .micro-timeline {
      width: 2px;
      height: 2400px;
      margin: 140px 0;
      flex-shrink: 0;
      opacity: 0.7;
    }
    .micro-timeline::before,
    .micro-timeline::after {
      top: auto;
      bottom: auto;
      left: 50%;
      transform: translateX(-50%);
    }
    .micro-timeline::before { top: -3px; }
    .micro-timeline::after  { bottom: -3px; }

    .micro-stage-inner {
      min-width: 100%;
      min-height: 100vh;
      justify-content: flex-start;
    }

    /* 节点沿纵轴定位 */
    .timeline-node {
      left: 50% !important;
      top: var(--node-pos);
      transform: translate(-50%, -50%);
    }

    /* 卡片：card-up → 右侧, card-down → 左侧 */
    .timeline-node.card-up .node-card {
      left: calc(50% + var(--card-offset) + 4px);
      right: auto;
      bottom: auto;
      top: 50%;
      transform: translateY(-50%);
      max-width: 130px;
    }
    .timeline-node.card-down .node-card {
      left: auto;
      right: calc(50% + var(--card-offset) + 4px);
      top: 50%;
      bottom: auto;
      transform: translateY(-50%);
      max-width: 130px;
    }
    .timeline-node:hover .node-card {
      transform: translateY(-50%) scale(1.06);
    }

    /* 连接线 → 水平 */
    .timeline-node.card-up .node-connector {
      right: auto;
      bottom: auto;
      left: 50%;
      top: 50%;
      width: var(--card-offset);
      height: 1.5px;
      transform: translateY(-50%);
    }
    .timeline-node.card-down .node-connector {
      left: auto;
      bottom: auto;
      right: 50%;
      top: 50%;
      width: var(--card-offset);
      height: 1.5px;
      transform: translateY(-50%);
    }

    /* 标题 */
    .main-title { font-size: 1.2rem; }
    .subtitle  { font-size: 0.6rem; }
    .title-area { padding-top: 16px; }

    /* 返回按钮 */
    .back-btn {
      top: 10px;
      left: 10px;
      padding: 5px 12px;
      font-size: 0.7rem;
    }

    /* 次级标题 */
    .micro-header { top: 20px; }
    .micro-header .dynasty-title { font-size: 1.1rem; }

    /* 卡片与变量 */
    .node-card { padding: 4px 7px; }
    .card-dynasty { font-size: 0.62rem; }
    .card-era    { font-size: 0.5rem; }
    :root {
      --connector-width: 24px;
      --connector-width-far: 48px;
      --dot-size: 8px;
      --dot-hover-size: 14px;
    }

    /* 模态框 — 上下分栏 */
    .modal-content { max-width: 100%; width: 94vw; }
    .modal-body {
      flex-direction: column;
      gap: 16px;
      padding: 18px 16px 16px;
    }
    .modal-sidebar {
      border-left: none;
      border-top: 1px solid rgba(196, 163, 90, 0.25);
      padding-left: 0;
      padding-top: 14px;
      flex: auto;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 14px;
    }
    .modal-sidebar-section { flex: 1 1 120px; }
    .modal-title { font-size: 1.15rem; }
    .modal-era   { font-size: 0.65rem; }
    .modal-desc  { font-size: 0.78rem; }
    .modal-close-btn { top: 8px; right: 10px; font-size: 1rem; }
    .modal-tag { font-size: 0.62rem; padding: 2px 7px; }
    .modal-sidebar-heading { font-size: 0.6rem; }
    .modal-image-placeholder { max-width: 180px; }
    .modal-model-viewer { max-width: 220px; }
    .modal-svg-viewer { max-width: 200px; }
    .modal-svg-companion { width: 26px; height: 26px; }
    .modal-image-hint { font-size: 0.6rem; }
  }

  /* ── 模态框 ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(44, 36, 22, 0.35);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-content {
    background: linear-gradient(180deg, #fffef9 0%, #f7f2e6 100%);
    border: 1px solid var(--card-border);
    border-radius: 6px;
    padding: 0;
    max-width: 680px;
    width: 92vw;
    box-shadow: 0 12px 48px rgba(44, 36, 22, 0.25);
    transform: translateY(12px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    position: relative;
    overflow: hidden;
  }
  .modal-overlay.active .modal-content {
    transform: translateY(0) scale(1);
  }

  /* 顶部装饰条 */
  .modal-accent-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--accent-gold), var(--accent), var(--accent-gold));
    opacity: 0.6;
  }

  .modal-close-btn {
    position: absolute;
    top: 10px;
    right: 14px;
    z-index: 2;
    background: none;
    border: none;
    font-size: 1.2rem;
    color: var(--ink-light);
    cursor: pointer;
    padding: 4px 8px;
    line-height: 1;
    transition: color 0.25s ease;
    font-family: 'Noto Serif SC', serif;
  }
  .modal-close-btn:hover {
    color: var(--accent);
  }

  /* 双栏主体 */
  .modal-body {
    display: flex;
    gap: 28px;
    padding: 28px 28px 24px;
  }

  /* 左栏：核心叙事 */
  .modal-main {
    flex: 1 1 0;
    min-width: 0;
  }

  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .modal-era {
    display: inline-block;
    font-size: 0.78rem;
    color: var(--ink-light);
    letter-spacing: 0.08em;
    margin-bottom: 16px;
    padding: 2px 10px;
    border: 1px solid rgba(196, 163, 90, 0.25);
    border-radius: 2px;
    background: rgba(196, 163, 90, 0.04);
    font-family: 'Noto Serif SC', serif;
  }

  .modal-desc {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.8;
    letter-spacing: 0.04em;
    text-align: justify;
  }

  /* 右栏：多维信息侧栏 */
  .modal-sidebar {
    flex: 0 0 210px;
    border-left: 1px solid rgba(196, 163, 90, 0.25);
    padding-left: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .modal-sidebar-section {
    display: none;
  }
  .modal-sidebar-section.has-content {
    display: block;
  }

  .modal-sidebar-heading {
    font-size: 0.68rem;
    color: var(--accent-gold);
    letter-spacing: 0.12em;
    margin-bottom: 8px;
    font-family: 'Noto Serif SC', serif;
  }

  .modal-sidebar-heading::before {
    content: '◆ ';
    font-size: 0.45rem;
    vertical-align: middle;
  }

  /* 标签 */
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }

  .modal-tag {
    display: inline-block;
    font-size: 0.7rem;
    color: var(--ink);
    background: rgba(139, 69, 19, 0.06);
    border: 1px solid rgba(139, 69, 19, 0.15);
    border-radius: 2px;
    padding: 2px 9px;
    letter-spacing: 0.04em;
    font-family: 'Noto Serif SC', serif;
    transition: all 0.25s ease;
  }
  .modal-tag:hover {
    background: rgba(139, 69, 19, 0.12);
    border-color: var(--accent-gold);
  }

  .modal-tag.figure {
    border-color: rgba(139, 69, 19, 0.28);
  }
  .modal-tag.artifact {
    background: rgba(196, 163, 90, 0.07);
    border-color: rgba(196, 163, 90, 0.28);
  }

  /* 文物影像占位框 */
  .modal-image-placeholder {
    aspect-ratio: 4 / 3;
    border: 2px dashed rgba(196, 163, 90, 0.28);
    border-radius: 3px;
    background:
      linear-gradient(135deg, rgba(139, 69, 19, 0.02) 25%, transparent 25%),
      linear-gradient(225deg, rgba(139, 69, 19, 0.02) 25%, transparent 25%),
      linear-gradient(315deg, rgba(139, 69, 19, 0.02) 25%, transparent 25%),
      linear-gradient(45deg,  rgba(139, 69, 19, 0.02) 25%, transparent 25%);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: placeholderShimmer 3.5s ease-in-out infinite;
    margin-bottom: 10px;
    overflow: hidden;
  }

  .modal-image-hint {
    font-size: 0.68rem;
    color: var(--ink-light);
    letter-spacing: 0.1em;
    opacity: 0.5;
    font-family: 'Noto Serif SC', serif;
  }

  @keyframes placeholderShimmer {
    0%, 100% { border-color: rgba(196, 163, 90, 0.22); }
    50%      { border-color: rgba(196, 163, 90, 0.5);  }
  }

  /* 3D 模型查看器 */
  .modal-model-viewer {
    aspect-ratio: 4 / 3;
    border-radius: 3px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    background: rgba(44, 36, 22, 0.03);
    border: 2px solid rgba(196, 163, 90, 0.3);
    box-shadow: inset 0 0 30px rgba(44, 36, 22, 0.04);
  }

  .modal-model-viewer model-viewer {
    width: 100%;
    height: 100%;
    --progress-bar-color: var(--accent-gold);
    --progress-bar-height: 3px;
    --progress-mask: transparent;
  }

  .modal-model-viewer .model-loading-spinner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 1;
  }

  .modal-model-viewer .model-loading-spinner::after {
    content: '';
    width: 28px;
    height: 28px;
    border: 2px solid rgba(196, 163, 90, 0.2);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: modelSpin 0.8s linear infinite;
  }

  @keyframes modelSpin {
    to { transform: rotate(360deg); }
  }

  /* ── SVG 拓片 / 印章图腾 ── */
  .modal-svg-viewer {
    aspect-ratio: 4 / 3;
    border-radius: 3px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(245,240,232,0.7) 0%, rgba(232,224,208,0.55) 100%);
    border: 2px solid rgba(139, 69, 19, 0.18);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .svg-rubbing-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 12px;
    width: 100%;
  }

  .modal-svg-rubbing {
    max-width: 85%;
    max-height: 85%;
    object-fit: contain;
    mix-blend-mode: multiply;
    opacity: 0.78;
    filter:
      url(#rubbingNoise)
      contrast(0.85)
      sepia(0.4)
      brightness(0.88)
      drop-shadow(1px 1px 0 rgba(139,69,19,0.08));
    transition: opacity 0.4s ease;
  }

  .modal-svg-viewer:hover .modal-svg-rubbing {
    opacity: 0.92;
  }

  .modal-svg-viewer::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(139, 69, 19, 0.015) 2px,
        rgba(139, 69, 19, 0.015) 3px
      );
    mix-blend-mode: overlay;
    z-index: 1;
  }

  /* ── SVG 同伴徽章（模型下方 / SVG 第二张起）── */
  .modal-svg-companions {
    display: flex;
    gap: 8px;
    padding: 6px 10px 10px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .modal-svg-companion {
    width: 32px;
    height: 32px;
    border-radius: 2px;
    background: rgba(245, 240, 232, 0.6);
    border: 1px solid rgba(139, 69, 19, 0.18);
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: rotate(-2deg);
    opacity: 0;
    animation: sealAppear 0.4s cubic-bezier(0.25, 0.8, 0.25, 1.2) forwards;
    transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2),
                border-color 0.3s ease,
                box-shadow 0.3s ease;
  }

  .modal-svg-companion img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    mix-blend-mode: multiply;
    opacity: 0.7;
    filter: sepia(0.45) brightness(0.85);
    transition: opacity 0.3s ease, filter 0.3s ease;
  }

  .modal-svg-companion:hover {
    transform: rotate(0deg) scale(1.18);
    border-color: rgba(139, 69, 19, 0.4);
    box-shadow: 0 2px 10px rgba(44, 36, 22, 0.1);
  }

  .modal-svg-companion:hover img {
    opacity: 0.92;
    filter: sepia(0.25) brightness(0.9);
  }

  @keyframes sealAppear {
    from { opacity: 0; transform: rotate(-6deg) scale(0.7); }
    to   { opacity: 1; transform: rotate(-2deg) scale(1); }
  }

  /* 3D 模型查看器内的同伴徽章（底部浮动） */
  .modal-model-viewer .modal-svg-companions {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 2;
    background: linear-gradient(0deg, rgba(245,240,232,0.92) 60%, transparent 100%);
    padding: 14px 10px 8px;
  }

  @keyframes mythPulse {
    0%, 100% {
      box-shadow: 0 0 0 2px rgba(74, 93, 78, 0.5), 0 0 12px rgba(74, 93, 78, 0.25);
    }
    50% {
      box-shadow: 0 0 0 3px rgba(74, 93, 78, 0.35), 0 0 22px rgba(74, 93, 78, 0.4);
    }
  }
</style>
</head>
<body>

<!-- 拓片噪点滤镜（供 CSS filter 引用） -->
<svg width="0" height="0" style="position:absolute;pointer-events:none;" aria-hidden="true">
  <defs>
    <filter id="rubbingNoise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="4" stitchTiles="stitch" result="noise" />
      <feColorMatrix type="saturate" values="0" in="noise" result="gray" />
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blended" />
    </filter>
    <filter id="stampWear" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="rough" />
      <feDisplacementMap in="SourceGraphic" in2="rough" scale="1.5" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </defs>
</svg>


  <!-- 标题 -->
  <div class="title-area">
    <h1 class="main-title">中国历史时间轴</h1>
    <p class="subtitle">CHINESE HISTORY TIMELINE</p>
  </div>

  <!-- 主时间轴阶段 -->
  <div id="macroStage" class="timeline-stage">
    <div id="macroTimeline" class="macro-timeline"></div>
  </div>

  <!-- 次级时间轴占位 -->
  <div id="microStage" class="timeline-stage macro-hidden">
    <div id="microInner" class="micro-stage-inner"></div>
  </div>

  <!-- 模态框 -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-accent-bar"></div>
      <button id="modalClose" class="modal-close-btn">&times;</button>
      <div class="modal-body">
        <div class="modal-main">
          <p id="modalTitle" class="modal-title"></p>
          <p id="modalEra" class="modal-era"></p>
          <p id="modalDesc" class="modal-desc"></p>
        </div>
        <div class="modal-sidebar">
          <div id="figuresSection" class="modal-sidebar-section">
            <p class="modal-sidebar-heading">关键人物</p>
            <div id="modalFigureTags" class="modal-tags"></div>
          </div>
          <div id="artifactsSection" class="modal-sidebar-section">
            <p class="modal-sidebar-heading">延伸考证</p>
            <div id="modalMediaBox" class="modal-image-placeholder">
              <span class="modal-image-hint">文物影像</span>
            </div>
            <div id="modalArtifactTags" class="modal-tags"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script src="data.js"></script>
<script>

// ──────────────────────────────────────────
// 通用：构建单个时间轴节点 DOM
// ──────────────────────────────────────────
function buildNode(item, index, onClick) {
  const mod = index % 4;
  const isUp = mod === 0 || mod === 2;
  const isFar = mod === 2 || mod === 3;
  const cardClass = (isUp ? 'card-up' : 'card-down') + (isFar ? ' offset-far' : '');

  const node = document.createElement('div');
  node.className = `timeline-node ${cardClass}` + (item.isMyth ? ' node-myth' : '');
  node.style.left = `${item.pos}%`;
  node.style.setProperty('--node-pos', `${item.pos}%`);

  const card = document.createElement('div');
  card.className = 'node-card';
  card.innerHTML = `
    <div class="card-dynasty">${item.name}</div>
    <div class="card-era">${item.era ? item.era : item.start + ' — ' + item.end}</div>
  `;

  const connector = document.createElement('div');
  connector.className = 'node-connector';

  const dot = document.createElement('div');
  dot.className = 'node-dot';

  node.appendChild(card);
  node.appendChild(connector);
  node.appendChild(dot);

  node.addEventListener('click', (e) => {
    e.stopPropagation();
    onClick(item);
  });

  return node;
}

// ──────────────────────────────────────────
// 通用：在容器中渲染时间轴
// ──────────────────────────────────────────
function renderTimeline(container, data, onClick) {
  container.innerHTML = '';
  data.forEach((item, index) => {
    container.appendChild(buildNode(item, index, onClick));
  });
}

// ──────────────────────────────────────────
// 模态框
// ──────────────────────────────────────────
const modalOverlay   = document.getElementById('modalOverlay');
const modalTitle     = document.getElementById('modalTitle');
const modalEra       = document.getElementById('modalEra');
const modalDesc      = document.getElementById('modalDesc');
const figureTags     = document.getElementById('modalFigureTags');
const artifactTags   = document.getElementById('modalArtifactTags');
const figuresSection = document.getElementById('figuresSection');
const artifactsSec   = document.getElementById('artifactsSection');
const modalMediaBox  = document.getElementById('modalMediaBox');

function isModelPath(s) { return /\.(glb|gltf)$/i.test(s); }
function isSvgPath(s)   { return /\.svg$/i.test(s); }

function populateTags(container, items, tagClass) {
  container.innerHTML = '';
  if (!items || items.length === 0) return;
  items.forEach((t) => {
    const span = document.createElement('span');
    span.className = `modal-tag ${tagClass}`;
    span.textContent = t;
    container.appendChild(span);
  });
}

function openModal(title, era, desc, figures, artifacts) {
  modalTitle.textContent = title;
  modalEra.textContent = era || '';
  modalDesc.textContent = desc || '';

  // 关键人物
  const hasFigures = figures && figures.length > 0;
  figuresSection.classList.toggle('has-content', hasFigures);
  if (hasFigures) populateTags(figureTags, figures, 'figure');

  // 延伸考证 — 分离 3D 模型 / SVG 图腾 / 文本标签
  const allArtifacts  = artifacts || [];
  const modelPaths    = allArtifacts.filter(isModelPath);
  const svgPaths      = allArtifacts.filter(isSvgPath);
  const textArtifacts = allArtifacts.filter((a) => !isModelPath(a) && !isSvgPath(a));

  artifactsSec.classList.add('has-content');

  // ── 3D 模型优先 ──
  if (modelPaths.length > 0) {
    modalMediaBox.className = 'modal-model-viewer';
    modalMediaBox.innerHTML = `
      <div class="model-loading-spinner"></div>
      <model-viewer
        src="${modelPaths[0]}"
        camera-controls
        auto-rotate
        auto-rotate-delay="1200"
        rotation-per-second="30deg"
        shadow-intensity="0.8"
        exposure="1.1"
        interaction-prompt="auto"
        camera-orbit="0deg 75deg 105%"
        min-camera-orbit="auto auto 50%"
        max-camera-orbit="auto auto 200%"
        interpolation-decay="200"
      ></model-viewer>
      ${svgPaths.length > 0 ? `
        <div class="modal-svg-companions">
          ${svgPaths.map((svg, i) => `
            <div class="modal-svg-companion" style="animation-delay:${i * 0.12}s;">
              <img src="${svg}" alt="" loading="lazy" />
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
    const mv = modalMediaBox.querySelector('model-viewer');
    mv.addEventListener('load', () => {
      const spinner = modalMediaBox.querySelector('.model-loading-spinner');
      if (spinner) spinner.remove();
    });
  }
  // ── SVG 图腾（拓片风格）──
  else if (svgPaths.length > 0) {
    modalMediaBox.className = 'modal-svg-viewer';
    modalMediaBox.innerHTML = `
      <div class="svg-rubbing-wrapper">
        <img src="${svgPaths[0]}" alt="" class="modal-svg-rubbing" loading="lazy" />
      </div>
      ${svgPaths.length > 1 ? `
        <div class="modal-svg-companions">
          ${svgPaths.slice(1).map((svg, i) => `
            <div class="modal-svg-companion" style="animation-delay:${i * 0.12}s;">
              <img src="${svg}" alt="" loading="lazy" />
            </div>
          `).join('')}
        </div>
      ` : ''}
    `;
  }
  // ── 空占位 ──
  else {
    modalMediaBox.className = 'modal-image-placeholder';
    modalMediaBox.innerHTML = '<span class="modal-image-hint">文物影像</span>';
  }

  // 文物文本标签
  if (textArtifacts.length > 0) {
    populateTags(artifactTags, textArtifacts, 'artifact');
  } else {
    artifactTags.innerHTML = '';
  }

  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
}

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
});

// ──────────────────────────────────────────
// 渲染主时间轴
// ──────────────────────────────────────────
const macroTimeline = document.getElementById('macroTimeline');
const macroStage = document.getElementById('macroStage');
const microStage = document.getElementById('microStage');
renderTimeline(macroTimeline, dynastyData, enterMicroTimeline);
// 初始滚动到主时间轴中央
if (window.innerWidth > 768) {
  macroStage.scrollLeft = (macroStage.scrollWidth - macroStage.clientWidth) / 2;
}

// ──────────────────────────────────────────
// 拖拽平移（仅桌面端）
// ──────────────────────────────────────────
function enableDragScroll(stage) {
  let isDown = false, startX, scrollLeft;

  stage.addEventListener('mousedown', (e) => {
    if (window.innerWidth <= 768) return;
    isDown = true;
    stage.classList.add('grabbing');
    startX = e.pageX - stage.offsetLeft;
    scrollLeft = stage.scrollLeft;
  });

  const stop = () => {
    isDown = false;
    stage.classList.remove('grabbing');
  };
  stage.addEventListener('mouseleave', stop);
  stage.addEventListener('mouseup', stop);

  stage.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - stage.offsetLeft;
    stage.scrollLeft = scrollLeft - (x - startX);
  });
}
enableDragScroll(macroStage);
enableDragScroll(microStage);

// ──────────────────────────────────────────
// 交互：进入次级时间轴
// ──────────────────────────────────────────
function enterMicroTimeline(dynasty) {
  const microInner = document.getElementById('microInner');

  const subData = subTimelineData[dynasty.id];

  if (!subData) {
    // 无次级数据时显示占位
    microInner.innerHTML = `
      <div style="text-align:center;">
        <p class="text-3xl font-bold tracking-widest mb-2" style="color:var(--accent);">${dynasty.name}</p>
        <p class="text-lg tracking-wide" style="color:var(--ink-light);">${dynasty.start} — ${dynasty.end}</p>
        <p class="text-sm mt-6 tracking-widest" style="color:var(--ink-light);">详细时间轴加载中...</p>
      </div>
    `;
    microInner.style.display = 'flex';
    microInner.style.alignItems = 'center';
    microInner.style.justifyContent = 'center';
  } else {
    // 构建次级时间轴
    microInner.style.display = 'flex';
    microInner.innerHTML = `
      <button class="back-btn" id="backBtn">← 返回总览</button>
      <div class="micro-header">
        <p class="dynasty-title">${dynasty.name}</p>
        <p class="dynasty-era">${dynasty.start} — ${dynasty.end}</p>
      </div>
      <div id="microTimeline" class="micro-timeline"></div>
    `;

    // 为次级节点分配 pos
    const count = subData.length;
    const subWithPos = subData.map((item, i) => ({
      ...item,
      pos: count === 1 ? 50 : 5 + (i / (count - 1)) * 90,
      start: item.era || '',
      end: item.desc || '',
    }));

    const microTimeline = document.getElementById('microTimeline');
    renderTimeline(microTimeline, subWithPos, (subItem) => {
      openModal(subItem.name, subItem.era || '', subItem.desc || '', subItem.key_figures, subItem.artifacts);
    });

    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      if (window.innerWidth > 768) {
        macroStage.scrollLeft = (macroStage.scrollWidth - macroStage.clientWidth) / 2;
      }
      document.body.classList.remove('micro-active');
      microStage.classList.add('macro-hidden');
      macroStage.classList.remove('macro-hidden');
    });
  }

  // 平滑切换
  microStage.scrollTop = 0;
  microStage.scrollLeft = 0;
  document.body.classList.add('micro-active');
  macroStage.classList.add('macro-hidden');
  microStage.classList.remove('macro-hidden');
}
</script>

</body>
</html>
