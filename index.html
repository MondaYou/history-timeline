<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国历史时间轴</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

  :root {
    --parchment: #f5f0e8;
    --parchment-dark: #e8e0d0;
    --ink: #2c2416;
    --ink-light: #5c5240;
    --accent: #8b4513;
    --accent-gold: #c4a35a;
    --timeline-line: #3c3428;
    --card-bg: rgba(255, 252, 245, 0.92);
    --card-border: rgba(139, 69, 19, 0.25);
    --card-shadow: 0 2px 16px rgba(44, 36, 22, 0.08);
    --card-hover-shadow: 0 6px 28px rgba(44, 36, 22, 0.16);
    --dot-size: 10px;
    --dot-hover-size: 16px;
    --connector-width: 36px;
    --connector-width-far: 68px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
    background-color: var(--parchment);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(196, 163, 90, 0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(139, 69, 19, 0.04) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    color: var(--ink);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ── 标题 ── */
  .title-area {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 28px 0 0;
    text-align: center;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  body.micro-active .title-area {
    opacity: 0;
  }

  .main-title {
    display: inline-block;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink);
    position: relative;
  }

  .main-title::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 10%;
    right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
  }

  .subtitle {
    margin-top: 14px;
    font-size: 0.85rem;
    color: var(--ink-light);
    letter-spacing: 0.2em;
    font-weight: 300;
  }

  /* ── 时间轴容器 ── */
  .timeline-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    overflow-x: auto;
    cursor: grab;
    user-select: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .timeline-stage::-webkit-scrollbar { display: none; }
  .timeline-stage { -ms-overflow-style: none; scrollbar-width: none; }
  .timeline-stage.grabbing { cursor: grabbing; }

  .timeline-stage.macro-hidden {
    opacity: 0;
    transform: scale(0.96);
    pointer-events: none;
  }

  /* ── 主轴 ── */
  .macro-timeline {
    position: relative;
    width: 2000px;
    flex-shrink: 0;
    height: 2px;
    background: var(--timeline-line);
    border-radius: 1px;
  }

  /* 主轴起点 / 终点装饰 */
  .macro-timeline::before,
  .macro-timeline::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 8px;
    height: 8px;
    background: var(--accent-gold);
    border-radius: 50%;
  }
  .macro-timeline::before { left: -4px; }
  .macro-timeline::after  { right: -4px; }

  /* ── 节点 ── */
  .timeline-node {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 2;
    --card-offset: var(--connector-width);
  }
  .timeline-node.offset-far {
    --card-offset: var(--connector-width-far);
  }

  /* 圆点 */
  .node-dot {
    width: var(--dot-size);
    height: var(--dot-size);
    border-radius: 50%;
    background: var(--accent);
    border: 2px solid var(--parchment);
    box-shadow: 0 0 0 2px var(--accent-gold);
    transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    position: relative;
  }

  .timeline-node:hover .node-dot {
    width: var(--dot-hover-size);
    height: var(--dot-hover-size);
    background: var(--accent-gold);
    box-shadow: 0 0 0 4px var(--accent-gold), 0 0 18px rgba(196, 163, 90, 0.5);
  }

  /* 连接线 */
  .node-connector {
    position: absolute;
    top: 50%;
    width: var(--connector-width);
    height: 1.5px;
    background: var(--ink-light);
    opacity: 0.5;
    transition: opacity 0.35s ease;
  }
  .timeline-node:hover .node-connector { opacity: 0.8; }

  .connector-up   { right: calc(100% + 2px); }
  .connector-down { left:   calc(100% + 2px); }

  /* ── 卡片 ── */
  .node-card {
    position: absolute;
    width: max-content;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    padding: 6px 12px;
    box-shadow: var(--card-shadow);
    transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    backdrop-filter: blur(4px);
  }

  /* 上方节点：卡片在轴上方，连接线向上 */
  .timeline-node.card-up .node-card {
    bottom: calc(var(--dot-hover-size) + 8px + var(--card-offset));
    left: 50%;
    transform: translateX(-50%);
  }
  .timeline-node.card-up .node-connector {
    right: 50%;
    top: auto;
    bottom: calc(var(--dot-size) / 2 + 4px);
    height: var(--card-offset);
    width: 1.5px;
    transform: translateX(50%);
  }

  /* 下方节点：卡片在轴下方，连接线向下 */
  .timeline-node.card-down .node-card {
    top: calc(var(--dot-hover-size) + 8px + var(--card-offset));
    left: 50%;
    transform: translateX(-50%);
  }
  .timeline-node.card-down .node-connector {
    left: 50%;
    top: calc(var(--dot-size) / 2 + 4px);
    height: var(--card-offset);
    width: 1.5px;
    transform: translateX(-50%);
  }

  .timeline-node:hover .node-card {
    box-shadow: var(--card-hover-shadow);
    border-color: var(--accent-gold);
    transform: translateX(-50%) scale(1.06);
    background: rgba(255, 252, 245, 0.98);
  }

  .card-dynasty {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .card-era {
    font-size: 0.6rem;
    color: var(--ink-light);
    margin-top: 2px;
    font-weight: 400;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  /* ── 次级时间轴专属 ── */
  .micro-stage-inner {
    position: relative;
    min-width: 100vw;
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .micro-header {
    position: absolute;
    top: 60px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
  }

  .micro-header .dynasty-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .micro-header .dynasty-era {
    font-size: 0.8rem;
    color: var(--ink-light);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  .back-btn {
    position: fixed;
    top: 24px;
    left: 32px;
    z-index: 10;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 3px;
    padding: 8px 18px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--ink);
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all 0.3s ease;
    backdrop-filter: blur(4px);
  }

  .back-btn:hover {
    border-color: var(--accent-gold);
    color: var(--accent);
    box-shadow: var(--card-hover-shadow);
  }

  .micro-timeline {
    position: relative;
    width: 1400px;
    flex-shrink: 0;
    height: 2px;
    background: var(--timeline-line);
    border-radius: 1px;
    opacity: 0.7;
  }

  .micro-timeline::before,
  .micro-timeline::after {
    content: '';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 6px;
    height: 6px;
    background: var(--accent-gold);
    border-radius: 50%;
  }
  .micro-timeline::before { left: -3px; }
  .micro-timeline::after  { right: -3px; }

  /* ── 响应式微调 ── */
  @media (max-width: 768px) {
    .main-title { font-size: 1.35rem; }
    .subtitle  { font-size: 0.65rem; }
    .macro-timeline { width: 1200px; }
    .micro-timeline { width: 1000px; }
    :root {
      --connector-width: 28px;
    }
    .node-card { padding: 4px 8px; }
    .card-dynasty { font-size: 0.66rem; }
    .card-era    { font-size: 0.54rem; }
    .micro-header .dynasty-title { font-size: 1.2rem; }
    .back-btn { top: 12px; left: 12px; padding: 6px 14px; font-size: 0.75rem; }
    .modal-content { max-width: 320px; padding: 24px 20px; }
    .modal-title { font-size: 1.1rem; }
    .modal-era   { font-size: 0.7rem; }
    .modal-desc  { font-size: 0.78rem; }
    .modal-close-btn { top: 4px; right: 8px; font-size: 1rem; padding: 4px 8px; }
  }

  /* ── 模态框 ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(44, 36, 22, 0.35);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
  }

  .modal-content {
    background: linear-gradient(180deg, #fffef9 0%, #f7f2e6 100%);
    border: 1px solid var(--card-border);
    border-radius: 4px;
    padding: 32px 28px;
    max-width: 400px;
    width: 88vw;
    box-shadow: 0 8px 40px rgba(44, 36, 22, 0.22);
    transform: translateY(12px) scale(0.97);
    transition: transform 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
    text-align: center;
    position: relative;
  }
  .modal-overlay.active .modal-content {
    transform: translateY(0) scale(1);
  }

  .modal-bar {
    width: 32px;
    height: 2px;
    background: var(--accent-gold);
    margin: 0 auto 18px;
  }

  .modal-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }

  .modal-era {
    font-size: 0.8rem;
    color: var(--ink-light);
    letter-spacing: 0.06em;
    margin-bottom: 14px;
  }

  .modal-desc {
    font-size: 0.9rem;
    color: var(--ink);
    line-height: 1.7;
    letter-spacing: 0.04em;
  }

  .modal-close-btn {
    position: absolute;
    top: 6px;
    right: 10px;
    background: none;
    border: none;
    font-size: 1.15rem;
    color: var(--ink-light);
    cursor: pointer;
    padding: 6px 10px;
    line-height: 1;
    transition: color 0.25s ease;
    font-family: 'Noto Serif SC', serif;
  }
  .modal-close-btn:hover {
    color: var(--accent);
  }
</style>
</head>

// ──────────────────────────────────────────
// 通用：构建单个时间轴节点 DOM
// ──────────────────────────────────────────
function buildNode(item, index, onClick) {
  const mod = index % 4;
  const isUp = mod === 0 || mod === 2;
  const isFar = mod === 2 || mod === 3;
  const cardClass = (isUp ? 'card-up' : 'card-down') + (isFar ? ' offset-far' : '');

  const node = document.createElement('div');
  node.className = `timeline-node ${cardClass}`;
  node.style.left = `${item.pos}%`;

  const card = document.createElement('div');
  card.className = 'node-card';
  card.innerHTML = `
    <div class="card-dynasty">${item.name}</div>
    <div class="card-era">${item.era ? item.era : item.start + ' — ' + item.end}</div>
  `;

  const connector = document.createElement('div');
  connector.className = 'node-connector';

  const dot = document.createElement('div');
  dot.className = 'node-dot';

  node.appendChild(card);
  node.appendChild(connector);
  node.appendChild(dot);

  node.addEventListener('click', (e) => {
    e.stopPropagation();
    onClick(item);
  });

  return node;
}

// ──────────────────────────────────────────
// 通用：在容器中渲染时间轴
// ──────────────────────────────────────────
function renderTimeline(container, data, onClick) {
  container.innerHTML = '';
  data.forEach((item, index) => {
    container.appendChild(buildNode(item, index, onClick));
  });
}

// ──────────────────────────────────────────
// 模态框
// ──────────────────────────────────────────
const modalOverlay = document.getElementById('modalOverlay');
const modalTitle = document.getElementById('modalTitle');
const modalEra = document.getElementById('modalEra');
const modalDesc = document.getElementById('modalDesc');

function openModal(title, era, desc) {
  modalTitle.textContent = title;
  modalEra.textContent = era;
  modalDesc.textContent = desc;
  modalOverlay.classList.add('active');
}

function closeModal() {
  modalOverlay.classList.remove('active');
}

modalOverlay.addEventListener('click', (e) => {
  if (e.target === modalOverlay) closeModal();
});
document.getElementById('modalClose').addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && modalOverlay.classList.contains('active')) closeModal();
});

// ──────────────────────────────────────────
// 渲染主时间轴
// ──────────────────────────────────────────
const macroTimeline = document.getElementById('macroTimeline');
const macroStage = document.getElementById('macroStage');
const microStage = document.getElementById('microStage');
renderTimeline(macroTimeline, dynastyData, enterMicroTimeline);
// 初始滚动到主时间轴中央
macroStage.scrollLeft = (macroStage.scrollWidth - macroStage.clientWidth) / 2;

// ──────────────────────────────────────────
// 拖拽平移
// ──────────────────────────────────────────
function enableDragScroll(stage) {
  let isDown = false, startX, scrollLeft;

  stage.addEventListener('mousedown', (e) => {
    isDown = true;
    stage.classList.add('grabbing');
    startX = e.pageX - stage.offsetLeft;
    scrollLeft = stage.scrollLeft;
  });

  const stop = () => {
    isDown = false;
    stage.classList.remove('grabbing');
  };
  stage.addEventListener('mouseleave', stop);
  stage.addEventListener('mouseup', stop);

  stage.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - stage.offsetLeft;
    stage.scrollLeft = scrollLeft - (x - startX);
  });
}
enableDragScroll(macroStage);
enableDragScroll(microStage);

// ──────────────────────────────────────────
// 交互：进入次级时间轴
// ──────────────────────────────────────────
function enterMicroTimeline(dynasty) {
  const microInner = document.getElementById('microInner');

  const subData = subTimelineData[dynasty.id];

  if (!subData) {
    // 无次级数据时显示占位
    microInner.innerHTML = `
      <div style="text-align:center;">
        <p class="text-3xl font-bold tracking-widest mb-2" style="color:var(--accent);">${dynasty.name}</p>
        <p class="text-lg tracking-wide" style="color:var(--ink-light);">${dynasty.start} — ${dynasty.end}</p>
        <p class="text-sm mt-6 tracking-widest" style="color:var(--ink-light);">详细时间轴加载中...</p>
      </div>
    `;
    microInner.style.display = 'flex';
    microInner.style.alignItems = 'center';
    microInner.style.justifyContent = 'center';
  } else {
    // 构建次级时间轴
    microInner.style.display = 'flex';
    microInner.innerHTML = `
      <button class="back-btn" id="backBtn">← 返回总览</button>
      <div class="micro-header">
        <p class="dynasty-title">${dynasty.name}</p>
        <p class="dynasty-era">${dynasty.start} — ${dynasty.end}</p>
      </div>
      <div id="microTimeline" class="micro-timeline"></div>
    `;

    // 为次级节点分配 pos
    const count = subData.length;
    const subWithPos = subData.map((item, i) => ({
      ...item,
      pos: count === 1 ? 50 : 5 + (i / (count - 1)) * 90,
      start: item.era || '',
      end: item.desc || '',
    }));

    const microTimeline = document.getElementById('microTimeline');
    renderTimeline(microTimeline, subWithPos, (subItem) => {
      openModal(subItem.name, subItem.era || '', subItem.desc || '');
    });

    // 返回按钮
    document.getElementById('backBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      macroStage.scrollLeft = (macroStage.scrollWidth - macroStage.clientWidth) / 2;
      document.body.classList.remove('micro-active');
      microStage.classList.add('macro-hidden');
      macroStage.classList.remove('macro-hidden');
    });
  }

  // 平滑切换
  microStage.scrollLeft = 0;
  document.body.classList.add('micro-active');
  macroStage.classList.add('macro-hidden');
  microStage.classList.remove('macro-hidden');
}
